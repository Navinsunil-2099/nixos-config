# --------------------------------------------------
# Background
# --------------------------------------------------

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.0117
    contrast = 1.05
    brightness = 0.82
    vibrancy = 0.20
    vibrancy_darkness = 0.0
}

# --------------------------------------------------
# Clock
# --------------------------------------------------

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"

    color = rgba(E6EAF2FF)

    font_size = 88
    font_family = JetBrainsMono Nerd Font

    position = 0, 180

    halign = center
    valign = center
}

# --------------------------------------------------
# Date
# --------------------------------------------------

label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A • %d %B %Y')"

    color = rgba(A6ADC8FF)

    font_size = 22
    font_family = JetBrainsMono Nerd Font

    position = 0, 110

    halign = center
    valign = center
}

# --------------------------------------------------
# Username
# --------------------------------------------------

label {
    monitor =
    text = Navin

    color = rgba(CDD6F4FF)

    font_size = 24
    font_family = JetBrainsMono Nerd Font

    position = 0, -20

    halign = center
    valign = center
}

# --------------------------------------------------
# Password Field
# --------------------------------------------------

input-field {
    monitor =

    size = 340, 60

    outline_thickness = 2

    dots_size = 0.25
    dots_spacing = 0.20
    dots_center = true

    outer_color = rgba(89B4FAFF)
    inner_color = rgba(1E1E2ECC)

    font_color = rgba(E6EAF2FF)

    fade_on_empty = false

    placeholder_text = Password...

    position = 0, -110

    halign = center
    valign = center

    rounding = 14

    check_color = rgba(A6E3A1FF)
    fail_color = rgba(F38BA8FF)

    fail_text = Incorrect Password

    capslock_color = rgba(F9E2AFFF)
}

# --------------------------------------------------
# Keyboard Layout
# --------------------------------------------------

label {
    monitor =

    text = EN

    color = rgba(A6ADC8FF)

    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = 35, 45

    halign = left
    valign = bottom
}

# --------------------------------------------------
# Battery
# --------------------------------------------------

label {
    monitor =

    text = cmd[update:30000] sh -c 'echo "󰁹 $(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1)%"'

    color = rgba(A6ADC8FF)

    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = -35, 45

    halign = right
    valign = bottom
}

# --------------------------------------------------
# NixOS Logo
# --------------------------------------------------

image {
    monitor =

    path = ~/.config/hypr/assets/nixos.png

    size = 70

    rounding = -1

    border_size = 0

    position = 0, 40

    halign = center
    valign = bottom
}
